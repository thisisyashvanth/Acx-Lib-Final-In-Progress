<h2>Sign In</h2>
<p>Access your Acxhange Library account</p>

<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <div>
        <label>Email Address</label>
        <input type="email" formControlName="email" placeholder="Enter your email" />
        <small class="error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            Please enter a valid email
        </small>
    </div>

    <div>
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Enter your password" />
        <small class="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            Password is required
        </small>
    </div>

    <div *ngIf="errorMessage">
        {{ errorMessage }}
    </div>

    <button type="submit" [disabled]="loginForm.invalid || loading">
        {{ loading ? 'Signing In...' : 'Sign In' }}
    </button>

</form>
